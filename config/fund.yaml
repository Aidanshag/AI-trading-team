# Top-level fund toggles that don't fit elsewhere.
# Kept small; most config lives in the specialized files.

# ── Idle-work mode ──────────────────────────────────────────
# When true, agents with nothing live to do pull from the idle backlog at
# vault/_meta/idle_backlog.md. Expands the brain autonomously while the
# user is away. When false, agents never touch the backlog — they idle.
#
# Activation requires BOTH this flag AND the backlog's frontmatter
# `status` field being `active`. Two-step gate is intentional.
idle_work_enabled: true

# Cost guardrails that apply only during idle-work mode (tighter than live)
idle_work_guardrails:
  max_tokens_per_wake: 3000
  max_wakes_per_day: 20
  force_cheap_tier: true          # no balanced/deep/frontier during idle
  halt_if_live_events: true       # pause idle work if a market event fires

# ── Autonomous mode ─────────────────────────────────────────
# When true, the orchestrator runs unattended: scheduler emits ticks,
# CIO wakes analysts, full chains run end-to-end without human approval.
# When false (default), the orchestrator still runs but every order
# goes through the supervised flow — which currently means the user is
# in the loop via Claude Code.
#
# Hard rules that ONLY apply under autonomous mode:
# - risk_limits.yaml:account.max_trades_per_day acts as a hard ceiling
# - autonomy_guardrails below cap daily wake count and API spend
autonomous_mode: true

# Autonomous-mode cost + activity guardrails (independent of idle_work).
autonomy_guardrails:
  max_wakes_per_day: 60           # all wakes combined; protects API budget
  max_usd_per_day: 5.00           # hard daily $ ceiling on API spend
  halt_action: "block_wakes"      # when exceeded: refuse new wakes (don't crash)

# ── Auto-halt at session close ──────────────────────────────
# When true, session_close_workflow re-engages trading_halt_until in
# risk_limits.yaml, freezing trading until next session morning. User
# (or scheduled task) explicitly clears it to resume.
auto_halt_at_session_close: false   # 24/5 mode — no overnight halt re-arm
auto_halt_resume_offset_hours: 16   # session closes 16:00 CT; resume +16h ≈ next 08:00 CT
