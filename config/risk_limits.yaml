# Risk limits — the single source of truth for the PreToolUse risk hook.
# Every value here should be set intentionally by the user.
# Placeholders are marked `# TODO user:` — review and replace every one.

# ============================================================
# GLOBAL HARD RULES (non-negotiable — enforced by risk hook)
# ============================================================
hard_rules:
  # 2026-04-29: relaxed by user directive — short futures now permitted.
  # Short OPTIONS are still blocked by config/risk_limits.yaml:options
  # (allow_naked_short_calls/puts/strangles/straddles all = false), so the
  # genuine unlimited-risk failure mode stays prohibited. The futures
  # short opens up roughly 2x the trigger surface area in mixed markets.
  # Defensive ladder, daily target lock, $250 per-trade cap, stop-loss
  # requirement, and Topstep DLL are all still active as backstops.
  no_naked_shorts: false
  require_stop_on_every_trade: true
  # Manual halt switch — emergency kill. Set true to block all orders permanently.
  trading_halted: false
  # Auto-expiring halt. While now-UTC < this timestamp, the risk hook treats
  # trading as halted regardless of `trading_halted` value. Lets us auto-flip
  # trading on at a known time without manual intervention.
  # ISO 8601 UTC. Set to a past timestamp (or remove) to allow trading immediately.
  # 24/5 trading enabled per user 2026-04-28. No active halt timestamp.
  # Auto-halt at session close is also disabled in fund.yaml for 24/5 mode.
  # Re-arm to a future timestamp here if you want to pause overnight.
  trading_halt_until: "2026-05-01T19:17:02Z"

# ============================================================
# ACCOUNT-LEVEL LIMITS
# ============================================================
# ============================================================
# TOPSTEP $50K COMBINE — LIVE RULES (confirmed 2026-04-23 by user)
# ============================================================
account:
  tier: "50K_combine"
  environment: combine

  starting_balance: 50000

  # ── Topstep's published rules for the $50K Combine ──────────
  daily_loss_limit_usd: 1000      # Topstep DLL — hard-coded by user purchase
  trailing_drawdown_usd: 2000     # TDD; follows highest account balance (EOD)
  max_open_contracts_total: 5     # $50K tier max; start lower while scaling
  consistency_cap_pct: 0.50       # no single day > 50% of total profit to date
  profit_target_usd: 3000         # $3,000 cumulative profit = Combine pass eligibility
  # Once profit_target_usd is reached, switch to MAINTAIN MODE: only defensive
  # / closing trades, no new entries that risk more than 25% of accumulated
  # buffer. The team's job after hitting $3K is to NOT GIVE IT BACK.
  maintain_after_target: true

  # ── Firm-wide percentage rule (applies in addition) ─────────
  daily_loss_limit_pct: 0.02      # 2% of equity. On $50K = $1000. Aligns w/Topstep.

  # ── AUTONOMOUS-MODE GUARDRAILS (user directive: "no trade cap" while
  # supervised; this is a separate hard cap for unattended sessions to
  # prevent runaway trade counts on a bad day). Only enforced when
  # `autonomous_mode: true` in config/fund.yaml. While supervised the
  # Risk Manager is the soft gate; while unattended this is the hard one.
  max_trades_per_day: 8           # absolute ceiling under autonomous mode

  # ── INTERNAL SOFT-DLL (critical — agents target THIS, not Topstep's) ─
  # User directive: "they should essentially never hit this daily loss limit".
  # Risk Manager treats these internal thresholds as hard floors.
  # 2026-04-30: TIGHTENED post-incident. Was 500/300/150. Halved to 250/150/75
  # for first day post-DLL-breach. RESTORE to 500/300/150 after one clean
  # session (no rule blocks, no agent cascades, EOD positive).
  internal_dll_target_usd: 250    # was 500 — temporarily tightened
  internal_dll_cooldown_usd: 150  # was 300 — temporarily tightened
  internal_dll_alert_usd: 75      # was 150 — temporarily tightened

  # Per-trade risk cap (independent of DLL): no single idea risks more than X
  per_trade_risk_pct_of_equity: 0.005   # 50 bps per trade max ($250 on $50K)

  # Soft warn-level thresholds (trigger alerts, not blocks)
  warn_daily_loss_pct: 0.30       # alert when 30% of DLL used (was 50%)
  warn_trailing_dd_pct: 0.40

# ============================================================
# RISK FRAMEWORK — TIERED RULES (added overnight 2026-04-27)
# ============================================================
# The hard floor (DLL, defensive ladder, naked-short block) doesn't move.
# The middle gets nuance — flexibility between safety floor and discipline.
risk_framework:

  # ── Conviction-tiered R:R minimums (replaces flat 2:1) ────
  # High-conviction trades trust the read more, can tolerate smaller reward
  # per unit risk. Low-conviction trades need bigger reward to compensate
  # for their uncertainty. Validation-grade is its own class (see below).
  rr_minimums:
    high:        1.5          # high conviction
    med:         2.0          # standard institutional bar
    low:         2.5          # need bigger reward for less certainty
    validation:  1.5          # validation-grade chain-test trades

  # ── Single-micro-contract floor exception ──────────────────
  # Today's failure: low-conviction Kelly-lite says max $15-20 risk, but
  # smallest possible position (1 micro contract) is often $50+. So low-
  # conviction micro trades were structurally impossible. Exception:
  # if smallest_possible_position_risk is the ONLY feasible size, allow
  # it as long as it's <= the floor below.
  single_micro_floor_pct_of_equity: 0.0025   # 25 bps = $125 on $50K

  # ── Validation-grade trade class ───────────────────────────
  # Pre-authorized lightweight class for chain testing and exploratory
  # trades. Only Tier-1 rules apply. R:R ≥ 1.5. Single CME instrument.
  # Single defined-risk leg. Limited to 1/session. Bypasses specialist
  # consult requirement (only Risk Manager review).
  validation_grade:
    enabled: true
    max_risk_usd: 75
    max_per_session: 1
    requires_specialist_consult: false
    requires_red_team_challenge: false      # only Risk Manager

  # ── Adaptive discipline based on day P&L ───────────────────
  # When the day is going well, allow slightly more flex. When it's going
  # poorly, tighten beyond standard rules. Defensive ladder still owns
  # the lockdown thresholds.
  adaptive_discipline:
    fresh:                          # day P&L >= 0
      rr_floor_offset:    0         # use rr_minimums as-is
      per_trade_cap_pct:  0.005     # 50 bps standard
    profitable_lite:                # day P&L between 0 and +$200
      rr_floor_offset:    0
      per_trade_cap_pct:  0.005
    profitable_heavy:               # day P&L >= +$200 (running profit)
      rr_floor_offset:    -0.25     # slightly looser; proven session
      per_trade_cap_pct:  0.006     # 60 bps allowed
    minor_drawdown:                 # day P&L between -$0 and -$100
      rr_floor_offset:    0
      per_trade_cap_pct:  0.005
    moderate_drawdown:              # day P&L between -$100 and -$200
      rr_floor_offset:    0.5       # tighter
      per_trade_cap_pct:  0.004     # 40 bps
    # Beyond -$200, defensive ladder takes over.

  # ── Risk Manager verdict types ─────────────────────────────
  # Today RM was binary: APPROVE / BLOCK. New: ALLOW_WITH_MODIFICATIONS,
  # which lets RM propose a smaller size that fits, instead of blocking.
  rm_verdict_types:
    - allow
    - allow_with_modifications        # RM may reduce size to fit caps
    - block

  # ── Pre-Trade Checklist tiering ────────────────────────────
  # Hard items: missing → BLOCK
  # Soft items: missing → APPROVE WITH NOTE (logged, but not blocking)
  checklist_hard_items: [1, 4, 5, 6, 9, 12]   # strategy/stop/$risk/%equity/invalidation/exec plan
  checklist_soft_items: [2, 3, 7, 8, 10, 11]  # trigger/entry/target/R:R/regime/correlation

# ============================================================
# COMBINE-MODE DEFENSIVE LADDER (new — user priority)
# ============================================================
# Progressive tightening as day P&L drops. Each level engages at a
# specific $-threshold from session open. Once engaged, does not reset
# until the following session.
combine_defense:
  # When day P&L crosses ANY of these, Risk Manager locks in that level
  # and does not unlock until next session.
  ladder:
    - threshold_usd: -150         # internal_dll_alert
      action: "warn"
      description: "Alert CIO; analysts proceed with caution, preferred sizing ~40 bps."
    - threshold_usd: -300         # internal_dll_cooldown
      action: "restrict"
      description: "No new entries unless closing existing risk or defined-risk spread. Max 40 bps per trade."
    - threshold_usd: -500         # internal_dll_target
      action: "lockdown"
      description: "Flat the book at next available opportunity. No new entries of any kind. Close all working orders."
    # ── TEMPORARY 2026-04-29 (USER OVERRIDE) ──
    # The -$750 emergency_flatten level is DISABLED for the rest of tonight's
    # session per user directive. Topstep's $1000 DLL remains the broker-side
    # hard backstop. The -$500 lockdown above still blocks new entries.
    # RESTORE BEFORE NEXT SESSION:
    #   - threshold_usd: -750
    #     action: "emergency_flatten"
    #     description: "Flatten at market immediately. Trading halted for session."

  # Topstep DLL is INTRADAY-TRAILING from the session's high-water mark.
  # That means a profitable morning + losing afternoon can still breach DLL
  # even if the day closes flat. Risk Manager must track running peak.
  track_intraday_peak: true

