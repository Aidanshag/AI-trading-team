# ============================================================
# SECTOR / CORRELATION LIMITS
# ============================================================
sector_limits:
  energies:    { max_net_contracts: 2 }
  metals:      { max_net_contracts: 2 }
  grains:      { max_net_contracts: 2 }
  softs:       { max_net_contracts: 1 }   # thinner liquidity
  livestock:   { max_net_contracts: 1 }   # limit-move risk
  rates:       { max_net_contracts: 2 }
  fx_futures:  { max_net_contracts: 2 }
  index_macro: { max_net_contracts: 2 }
# Correlated-basket check (block if net exposure across correlated symbols exceeds).
# Net = absolute sum of signed positions across the basket.
correlated_baskets:
  - name: risk_on_index
    symbols: [ES, MES, NQ, MNQ, RTY, M2K, YM, MYM]
    max_net_contracts: 3
  - name: precious_metals
    symbols: [GC, MGC, SI, SIL, PL, PA]
    max_net_contracts: 2
  - name: petroleum_complex
    symbols: [CL, MCL, BZ, RB, HO]
    max_net_contracts: 3
  - name: nat_gas_complex
    symbols: [NG, QG]
    max_net_contracts: 2
  - name: grains_oilseeds
    symbols: [ZC, ZW, ZS, ZL, ZM, ZO, ZR]
    max_net_contracts: 3
  - name: tropical_softs
    symbols: [KC, CT, SB, CC, OJ]
    max_net_contracts: 2
  - name: livestock_complex
    symbols: [LE, GF, HE]
    max_net_contracts: 2
  - name: rates_curve
    symbols: [ZT, ZF, ZN, ZB, UB]
    max_net_contracts: 3
  - name: g10_fx
    symbols: ["6E", "6B", "6J", "6A", "6C", "6S", M6E, M6B]
    max_net_contracts: 3
  - name: industrial_metals
    symbols: [HG, ALI]
    max_net_contracts: 2

# ============================================================
# OPTIONS-SPECIFIC (checked by options risk agent + hook)
# ============================================================
options:
  allow_naked_short_calls: false
  allow_naked_short_puts:  false
  allow_short_strangles:   false
  allow_short_straddles:   false
  allowed_structures:
    - long_call
    - long_put
    - long_call_spread
    - long_put_spread
    - short_call_spread      # defined risk
    - short_put_spread       # defined risk
    - iron_condor
    - iron_butterfly
    - calendar_spread
    - diagonal_spread
  max_net_delta_per_symbol: 3.0
  max_net_vega_per_symbol:  500
  min_dte_open: 3            # no 0–2 DTE entries
  max_dte_open: 60
  close_at_dte: 2            # force-close rule handed to exec trader

# ============================================================
# TIME / SESSION GUARDS
# ============================================================
sessions:
  block_first_n_seconds_after_open: 60
  block_last_n_seconds_before_close: 120
  # 24/5 trading enabled per user 2026-04-28. Globex futures trade Sun 17:00 CT
  # through Fri 16:00 CT with brief daily break ~16:00-17:00 CT. The cutoff
  # below is set to the very end of the daily window so we still respect the
  # Globex daily-break maintenance window but otherwise trade all hours.
  no_new_positions_after_local_time: "15:55"   # America/Chicago — only blocks the last 5 min before daily Globex maintenance break
  pause_around_high_impact_events: true
