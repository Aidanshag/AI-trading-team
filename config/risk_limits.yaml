# Fee-aware decision rules
fee_decision:
  # Skip a trade if expected reward (target − entry) < this × round-trip fee.
  # 3× means "even if I only win 1 in 3 trades I still net positive."
  min_reward_to_fee_ratio: 3.0
  # If true, fees count against the daily target lock too.
  fees_count_toward_pl: true

# ============================================================
# COMBINE PACING (profit lock-in)
# ============================================================
# The defensive ladder catches losses. This catches "winning, then bleeding
# it back." Topstep's 50% consistency rule punishes asymmetric days.
combine_pacing:
  # 2026-05-05: RESTORED to 400 after the overnight giveback incident.
  # The "diagnostic disable" let +$1190.80 give back to +$354 (-$837)
  # because three new entries fired AFTER the daily target was hit.
  # Per-trade GAIN_TIER_HARD_CAP_USD does NOT substitute for the daily
  # lock — it caps a single position, not the day's accumulated P&L.
  # Do not disable this without an explicit replacement that is at least
  # as strong at the day-level.
  daily_soft_target_usd:  200    # +$200: log advisory; sizing tightens
  daily_hard_target_usd:  400    # +$400: BLOCK new entries; manage book only
  partial_giveback_pct:   0.40   # if peak +$X then back to peak*0.6 → lockdown

  # ── HARD-TARGET ACTION (added 2026-05-05 per user directive) ──
  # When realized day P&L hits daily_hard_target_usd, what to do beyond
  # blocking new entries:
  #   "block_new"          → existing book stays open with its stops (current)
  #   "cancel_working"     → cancel any unfilled limit / stop entries too
  #   "force_flat"         → cancel + market-close all open positions
  # Default "cancel_working" — catches the failure mode where a limit
  # entry fills AFTER the lock-block (working order placed before lock,
  # filled after) and prevents the +$400 from giving back via a
  # post-lock entry. force_flat is opt-in (most aggressive lock-in).
  daily_target_action:    "cancel_working"

  # ── CONSISTENCY TARGET (Topstep 50% rule, encoded as a daily ceiling) ──
  # The consistency rule says no single day's P&L can exceed 50% of total
  # profit-to-date at submission. Operationally that means each day should
  # cap at ~50% of the daily_hard_target — giving the next day room to be
  # a comparable contributor.
  # 50% of $400 daily_hard_target = $200. After +$200 in any single day,
  # treat further wins as "consistency-protective surplus" — log them but
  # tighten new entries to defensive only. This caps a SINGLE great day
  # from forcing a string of $400 days to satisfy the 50% rule at submission.
  consistency_daily_ceiling_usd: 200    # 50% of daily_hard_target

  # ── PROFIT TARGET MAINTAIN MODE ──
  # Once cumulative profit ≥ account.profit_target_usd ($3,000):
  #   - No new entries that risk more than 25% of the buffer above target
  #   - Existing positions are managed (stops/targets) but not added to
  #   - Each day's loss tolerance halves
  # The job after $3K is preserving the result, not adding to it.
  maintain_mode_per_trade_buffer_pct: 0.25
  maintain_mode_dll_halving:           true

# ============================================================
# ANTI-TILT (added 2026-04-29)
# ============================================================
anti_tilt:
  post_stop_cooldown_minutes: 15   # no new entries within 15 min of any stop-out

# ============================================================
# REGIME GATES (added 2026-04-29 — post DLL-breach)
# ============================================================
# The 2026-04-29 incident bled $1,013 via 100+ micro round-trips during
# 03:30-07:00 UTC (Asian thin tape). Strategies generated technical
# triggers that were actually random walk noise.
regime_gates:
  # When time is in this window (Eastern), no new entries are placed.
  # 2026-05-04: disabled by user directive to open after-hours trading for
  # diagnostic visibility. Re-enable if overnight thin-tape bleed reappears.
  # Hard floors (DLL/TDD/defensive ladder) still active as backstop.
  thin_tape:
    enabled: false
    start_et: "21:00"
    end_et:   "04:00"
    action:   "block_all_entries"
    reason:   "Thin-tape window — random walk dominates; signals are noise."

  # Strategies that fire on chop / mean-reversion / range patterns.
  # Used by future regime classifier; advisory for now.
  regime_sensitive_strategies:
    - rsi2_extreme_reversion
    - bollinger_mean_reversion
    - range_mean_reversion
    # vwap_reversion REMOVED 2026-05-04 — strategy deleted (broken edge)
    - vol_spike_fade
    - support_resistance_bounce
    - volume_spike_reversal
    - gap_fill
    - pivot_reversal
    - narrow_range_break
    - inside_bar_break
    - opening_range_breakout

# ============================================================
# COST DISCIPLINE (added 2026-04-29 — fee-frequency lesson)
# ============================================================
# The bleed was death-by-fees: ~100 round-trips × $1.50 = ~$150 in fees alone.
# Per-trade gates aren't enough at high frequency.
cost_discipline:
  daily_fee_budget_usd:           30.00   # ~10 micros or ~6 full-size before halt
  per_symbol_trade_count_warn:     3      # warn / log advisory
  per_symbol_trade_count_block:    5      # hard block: no more entries on this symbol today
  max_trades_per_day_cost_aware:  12      # aggregate trade count for the day

# ============================================================
# STRATEGY BLACKLIST (lessons promoted to RULE tier — encoded as data)
# ============================================================
strategy_blacklist:
  - { symbol: ZN, strategy: opening_range_breakout, reason: "2026-04-29 lesson — ORB on ZN fills overnight in thin liquidity" }
  - { symbol: NG, strategy: opening_range_breakout, reason: "Inherited from ZN lesson — overnight thin-tape risk" }

# ============================================================
# TIME / SESSION GUARDS
# ============================================================
sessions:
  block_first_n_seconds_after_open: 60
  block_last_n_seconds_before_close: 120
  # 2026-04-30: gives the snapshot pipeline time to write rows before any
  # trade fires. Catches "system started, fired immediately, snapshot table
  # still empty, P&L checks no-op" — the failure mode of 2026-04-29.
  block_first_n_minutes_after_globex_reopen: 30
  # Pre/post blackout around high-impact events. Reads
  # vault/economic_calendar/today.json. 0 disables the check.
  high_impact_blackout_minutes: 5
  # 24/5 trading enabled per user 2026-04-28. Globex futures trade Sun 17:00 CT
  # through Fri 16:00 CT with brief daily break ~16:00-17:00 CT.
  no_new_positions_after_local_time: "15:55"   # America/Chicago — only blocks the last 5 min before daily Globex maintenance break
  pause_around_high_impact_events: true
