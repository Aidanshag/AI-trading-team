# Risk limits — the single source of truth for the PreToolUse risk hook.
# Every value here should be set intentionally by the user.
# Placeholders are marked `# TODO user:` — review and replace every one.

# ============================================================
# GLOBAL HARD RULES (non-negotiable — enforced by risk hook)
# ============================================================
hard_rules:
  no_naked_shorts: true       # blocks outright short futures and uncovered short options
  require_stop_on_every_trade: true
  # Trading halted while autonomous weekend run is active. Flip to false
  # Monday morning before supervised live session.
  trading_halted: true

# ============================================================
# ACCOUNT-LEVEL LIMITS
# ============================================================
# ============================================================
# TOPSTEP $50K COMBINE — LIVE RULES (confirmed 2026-04-23 by user)
# ============================================================
account:
  tier: "50K_combine"
  environment: combine

  starting_balance: 50000

  # ── Topstep's published rules for the $50K Combine ──────────
  daily_loss_limit_usd: 1000      # Topstep DLL — hard-coded by user purchase
  trailing_drawdown_usd: 2000     # TDD; follows highest account balance (EOD)
  max_open_contracts_total: 5     # $50K tier max; start lower while scaling
  consistency_cap_pct: 0.50       # no single day > 50% of total profit to date

  # ── Firm-wide percentage rule (applies in addition) ─────────
  daily_loss_limit_pct: 0.02      # 2% of equity. On $50K = $1000. Aligns w/Topstep.

  # ── INTERNAL SOFT-DLL (critical — agents target THIS, not Topstep's) ─
  # User directive: "they should essentially never hit this daily loss limit".
  # Risk Manager treats these internal thresholds as hard floors.
  internal_dll_target_usd: 500    # 50% of Topstep DLL — absolute worst-day limit
  internal_dll_cooldown_usd: 300  # 30% of Topstep DLL — tighten sizing, no new adds
  internal_dll_alert_usd: 150     # 15% of Topstep DLL — heightened attention

  # Per-trade risk cap (independent of DLL): no single idea risks more than X
  per_trade_risk_pct_of_equity: 0.005   # 50 bps per trade max ($250 on $50K)

  # Soft warn-level thresholds (trigger alerts, not blocks)
  warn_daily_loss_pct: 0.30       # alert when 30% of DLL used (was 50%)
  warn_trailing_dd_pct: 0.40

# ============================================================
# COMBINE-MODE DEFENSIVE LADDER (new — user priority)
# ============================================================
# Progressive tightening as day P&L drops. Each level engages at a
# specific $-threshold from session open. Once engaged, does not reset
# until the following session.
combine_defense:
  # When day P&L crosses ANY of these, Risk Manager locks in that level
  # and does not unlock until next session.
  ladder:
    - threshold_usd: -150         # internal_dll_alert
      action: "warn"
      description: "Alert CIO; analysts proceed with caution, preferred sizing ~40 bps."
    - threshold_usd: -300         # internal_dll_cooldown
      action: "restrict"
      description: "No new entries unless closing existing risk or defined-risk spread. Max 40 bps per trade."
    - threshold_usd: -500         # internal_dll_target
      action: "lockdown"
      description: "Flat the book at next available opportunity. No new entries of any kind. Close all working orders."
    - threshold_usd: -750         # 75% of Topstep DLL — approaching breach
      action: "emergency_flatten"
      description: "Flatten at market immediately. Trading halted for session."

  # Topstep DLL is INTRADAY-TRAILING from the session's high-water mark.
  # That means a profitable morning + losing afternoon can still breach DLL
  # even if the day closes flat. Risk Manager must track running peak.
  track_intraday_peak: true

# ============================================================
# PER-SYMBOL LIMITS
# ============================================================
per_symbol:
  default:
    max_contracts: 1
    max_notional_usd: 75000
    required_stop_ticks: 20
  # Override per contract — TODO user: review each
  ES:   { max_contracts: 1, max_notional_usd: 300000, required_stop_ticks: 12 }
  MES:  { max_contracts: 3, max_notional_usd: 30000,  required_stop_ticks: 12 }
  NQ:   { max_contracts: 1, max_notional_usd: 400000, required_stop_ticks: 20 }
  MNQ:  { max_contracts: 3, max_notional_usd: 40000,  required_stop_ticks: 20 }
  CL:   { max_contracts: 1, max_notional_usd: 80000,  required_stop_ticks: 20 }
  MCL:  { max_contracts: 2, max_notional_usd: 8000,   required_stop_ticks: 20 }
  GC:   { max_contracts: 1, max_notional_usd: 220000, required_stop_ticks: 20 }
  MGC:  { max_contracts: 2, max_notional_usd: 22000,  required_stop_ticks: 20 }
  SI:   { max_contracts: 1, max_notional_usd: 170000, required_stop_ticks: 30 }
  ZC:   { max_contracts: 1, max_notional_usd: 25000,  required_stop_ticks: 10 }
  ZS:   { max_contracts: 1, max_notional_usd: 65000,  required_stop_ticks: 15 }
  ZN:   { max_contracts: 1, max_notional_usd: 110000, required_stop_ticks: 8  }
  "6E": { max_contracts: 1, max_notional_usd: 140000, required_stop_ticks: 20 }
  "6J": { max_contracts: 1, max_notional_usd: 85000,  required_stop_ticks: 20 }
  M6E: { max_contracts: 2, max_notional_usd: 14000,  required_stop_ticks: 20 }

# ============================================================
# SECTOR / CORRELATION LIMITS
# ============================================================
sector_limits:
  energies:    { max_net_contracts: 2 }
  metals:      { max_net_contracts: 2 }
  grains:      { max_net_contracts: 2 }
  softs:       { max_net_contracts: 1 }   # thinner liquidity
  livestock:   { max_net_contracts: 1 }   # limit-move risk
  rates:       { max_net_contracts: 2 }
  fx_futures:  { max_net_contracts: 2 }
  index_macro: { max_net_contracts: 2 }
# Correlated-basket check (block if net exposure across correlated symbols exceeds)
correlated_baskets:
  - name: risk_on_index
    symbols: [ES, MES, NQ, MNQ, RTY, M2K, YM, MYM]
    max_net_contracts: 3
  - name: precious_metals
    symbols: [GC, MGC, SI, SIL]
    max_net_contracts: 2

# ============================================================
# OPTIONS-SPECIFIC (checked by options risk agent + hook)
# ============================================================
options:
  allow_naked_short_calls: false
  allow_naked_short_puts:  false
  allow_short_strangles:   false
  allow_short_straddles:   false
  allowed_structures:
    - long_call
    - long_put
    - long_call_spread
    - long_put_spread
    - short_call_spread      # defined risk
    - short_put_spread       # defined risk
    - iron_condor
    - iron_butterfly
    - calendar_spread
    - diagonal_spread
  max_net_delta_per_symbol: 3.0
  max_net_vega_per_symbol:  500
  min_dte_open: 3            # no 0–2 DTE entries
  max_dte_open: 60
  close_at_dte: 2            # force-close rule handed to exec trader

# ============================================================
# TIME / SESSION GUARDS
# ============================================================
sessions:
  block_first_n_seconds_after_open: 60
  block_last_n_seconds_before_close: 120
  no_new_positions_after_local_time: "15:45"   # America/Chicago
  pause_around_high_impact_events: true
